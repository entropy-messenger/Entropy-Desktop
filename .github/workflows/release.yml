name: "Publish Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: "--bundles deb,appimage,rpm"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Protoc (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install protobuf

      - name: Install Dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev nm-tray libvips-dev libsoup-3.0-dev rpm libopus-dev libmp3lame-dev

      - name: setup protoc (Windows)
        if: matrix.platform == 'windows-latest'
        uses: arduino/setup-protoc@v3
        with:
          version: "27.1"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: install openssl (windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          vcpkg install openssl:x64-windows-static-md
          $pkgPath = Join-Path $env:VCPKG_INSTALLATION_ROOT "packages/openssl_x64-windows-static-md"
          echo "OPENSSL_DIR=$pkgPath" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        with:
          owner: entropy-messenger
          repo: entropydesktop-releases
          tagName: v__VERSION__
          releaseName: "Entropy v__VERSION__"
          releaseBody: "See the assets below for the latest Entropy binaries."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
